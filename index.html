<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Project Launch Tracker — Mangalam HQ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E83131;--red-dark:#C42020;--red-light:#FEF0F0;
  --charcoal:#2B2B2B;--text-body:#555;--text-muted:#888;
  --white:#FFF;--off-white:#F9F8F6;
  --border:rgba(0,0,0,.08);--border-med:rgba(0,0,0,.14);
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 4px 20px rgba(0,0,0,.09);
  --navy:#1A3F6F;--navy-l:#EAF0F8;
  --gold:#B8922A;--gold-l:#FAF3E3;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --amber:#D97706;--amber-l:#FEF3C7;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
}
body{font-family:'Segoe UI',-apple-system,Arial,sans-serif;background:var(--off-white);color:var(--charcoal);min-height:100vh;font-size:15px;line-height:1.65}

/* ── NAV (exact match to people-roi) ── */
.nav{background:var(--white);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 40px;position:sticky;top:0;z-index:100;gap:16px}
.nav-back{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-muted);font-size:13px;padding:6px 12px;border:1px solid var(--border-med);border-radius:var(--r-sm);transition:all .15s}
.nav-back:hover{color:var(--charcoal);border-color:var(--navy)}
.nav-div{width:1px;height:22px;background:var(--border-med)}
.nav-title{font-size:14px;font-weight:700;color:var(--charcoal)}
.nav-sub{font-size:11px;color:var(--text-muted);margin-left:4px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-info{font-size:11px;color:var(--text-muted)}
.nav-btn{font-size:12px;font-weight:700;padding:7px 16px;border-radius:var(--r-sm);border:1px solid var(--border-med);background:var(--white);color:var(--text-body);cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--navy);color:var(--navy)}
.nav-btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.nav-btn-primary:hover{background:#1E4A7A;color:#fff}

/* ── MAIN ── */
.main{max-width:1280px;margin:0 auto;padding:32px 40px 64px}

/* ── SHEET BANNER ── */
.sheet-banner{display:none;padding:9px 40px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:90}

/* ── KPI STRIP (exact people-roi style) ── */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border-med);border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border-med);margin-bottom:28px;box-shadow:var(--shadow-sm)}
.kpi-cell{background:var(--white);padding:18px 20px;text-align:center}
.kpi-v{font-size:22px;font-weight:700;color:var(--charcoal);line-height:1.1}
.kpi-l{font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:.8px;text-transform:uppercase}

/* ── TABS ── */
.tabs-row{display:flex;gap:2px;margin-bottom:24px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:4px;width:fit-content;box-shadow:var(--shadow-sm)}
.tab-btn{padding:7px 18px;border:none;border-radius:var(--r-md);font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-muted);transition:all .15s;letter-spacing:.3px}
.tab-btn.active{background:var(--navy);color:#fff}
.tab-btn:hover:not(.active){background:var(--off-white);color:var(--charcoal)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.toolbar-left{display:flex;align-items:center;gap:10px}
.toolbar-left h2{font-size:16px;font-weight:700;color:var(--charcoal)}
.toolbar-right{display:flex;gap:8px}
.filter-sel{font-size:12px;padding:7px 12px;border:1px solid var(--border-med);border-radius:var(--r-sm);background:var(--white);color:var(--charcoal);outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--navy)}
.action-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border-med);background:var(--white);color:var(--text-muted);cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--navy);color:var(--navy)}
.action-btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.action-btn-primary:hover{background:#1E4A7A;color:#fff}

/* ── ALERT STRIP ── */
.alert-strip{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:var(--r-lg);padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.alert-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.alert-sec-t{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.alert-sec-t::before{content:'';width:12px;height:2px;background:var(--red);border-radius:1px}
.alert-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--off-white);align-items:flex-start}
.alert-row:last-child{border-bottom:none}
.alert-name{font-size:12px;font-weight:700;color:var(--charcoal)}
.alert-sub{font-size:11px;color:var(--text-muted);margin-top:1px}

/* ── PROJECT GRID ── */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px;margin-bottom:8px}

/* ── PROJECT CARD (HQ portal card style) ── */
.proj-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column}
.proj-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card-stripe{height:3px}
.card-stripe-teal{background:var(--teal)}
.card-stripe-navy{background:var(--navy)}
.card-stripe-amber{background:var(--amber)}
.card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column;gap:12px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-ico{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-ico-teal{background:var(--teal-l);color:var(--teal)}
.card-ico-navy{background:var(--navy-l);color:var(--navy)}
.card-ico-amber{background:var(--amber-l);color:var(--amber)}
.card-name{font-size:15px;font-weight:700;color:var(--charcoal);margin-bottom:2px}
.card-sub{font-size:11px;color:var(--text-muted)}
.card-desc{font-size:13px;color:var(--text-body);line-height:1.55}

/* PROGRESS */
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:4px}
.prog-bar{height:5px;border-radius:3px;background:var(--off-white);overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:3px;transition:width .5s}

/* TAGS */
.ctags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 8px;background:var(--off-white);border:1px solid var(--border-med);border-radius:4px;color:var(--text-muted)}

/* CARD FOOTER */
.card-foot{padding:10px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cfoot-l{font-size:11px;color:var(--text-muted)}
.cfoot-l strong{color:var(--charcoal)}
.copen{font-size:11px;font-weight:700;padding:4px 12px;border:1px solid var(--border-med);border-radius:var(--r-sm);background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.copen:hover{border-color:var(--navy);color:var(--navy)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap}
.b-green{background:var(--teal-l);color:var(--teal)}
.b-blue{background:var(--navy-l);color:var(--navy)}
.b-amber{background:var(--amber-l);color:#92400E}
.b-red{background:var(--red-light);color:var(--red-dark)}
.b-gray{background:#F3F4F6;color:#6B7280}
.b-gold{background:var(--gold-l);color:var(--gold)}

/* DAYS CHIPS */
.dc{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
.dc-over{background:var(--red-light);color:var(--red-dark)}
.dc-soon{background:var(--amber-l);color:#92400E}
.dc-ok{background:var(--teal-l);color:var(--teal)}
.dc-done{background:#F3F4F6;color:#9CA3AF}
.dc-na{color:var(--text-muted);font-size:10px}

/* ── TABLE CARD ── */
.table-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:16px}
.table-card-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--off-white)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);font-weight:700;background:var(--off-white);border-bottom:1px solid var(--border-med);white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFAFA}
.tbl .key-row td{background:rgba(26,63,111,.025)}
.date-inp{border:1px solid var(--border-med);border-radius:var(--r-sm);padding:4px 8px;font-size:11px;color:var(--charcoal);background:var(--white);cursor:pointer;width:120px;font-family:inherit;outline:none}
.date-inp:focus{border-color:var(--navy);box-shadow:0 0 0 2px rgba(26,63,111,.1)}
.date-inp.changed{border-color:var(--gold);background:var(--gold-l)}
.status-sel{border:1px solid var(--border-med);border-radius:var(--r-sm);padding:4px 8px;font-size:11px;background:var(--white);cursor:pointer;font-family:inherit;outline:none}
.status-sel:focus{border-color:var(--navy)}

/* ── TIMELINE ── */
.tl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:16px;overflow-x:auto;box-shadow:var(--shadow-sm)}
.tl-row{display:flex;align-items:center;margin-bottom:8px;min-width:800px}
.tl-label{width:140px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--charcoal);padding-right:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-track{flex:1;height:24px;position:relative;background:var(--off-white);border-radius:4px;border:1px solid var(--border)}
.tl-bar{position:absolute;height:100%;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden}
.tl-dot{position:absolute;width:10px;height:10px;border-radius:50%;top:7px;transform:translateX(-50%);border:2px solid #fff;z-index:2;cursor:pointer}
.tl-tip{position:absolute;background:var(--charcoal);color:#fff;padding:4px 8px;border-radius:6px;font-size:10px;white-space:nowrap;z-index:10;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);pointer-events:none;display:none;box-shadow:var(--shadow-md)}
.tl-dot:hover .tl-tip{display:block}

/* ── SUMMARY TABLE ── */
.sum-tbl{width:100%;border-collapse:collapse;font-size:13px}
.sum-tbl th{padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);font-weight:700;background:var(--off-white);border-bottom:1px solid var(--border-med);white-space:nowrap}
.sum-tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px}
.sum-tbl tr:last-child td{border-bottom:none}
.sum-tbl tr:hover td{background:#FAFAFA}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;display:none}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-xl);padding:28px;width:520px;max-width:96vw;box-shadow:var(--shadow-md);max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:700;color:var(--charcoal);margin-bottom:18px}
.form-row{margin-bottom:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-lbl{font-size:11px;font-weight:700;color:var(--charcoal);margin-bottom:4px;display:block;letter-spacing:.3px}
.form-inp{width:100%;border:1px solid var(--border-med);border-radius:var(--r-sm);padding:8px 11px;font-size:13px;color:var(--charcoal);font-family:inherit;outline:none;background:var(--off-white)}
.form-inp:focus{border-color:var(--navy);background:var(--white)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.btn-primary{padding:8px 20px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer}
.btn-primary:hover{background:#1E4A7A}
.btn-danger{padding:8px 14px;background:var(--red-light);color:var(--red-dark);border:1px solid rgba(232,49,49,.2);border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer}
.btn-cancel-m{padding:8px 14px;background:transparent;border:1px solid var(--border-med);border-radius:var(--r-sm);font-size:13px;color:var(--text-muted);cursor:pointer}

footer{background:var(--white);border-top:1px solid var(--border);text-align:center;padding:14px;font-size:11px;color:var(--text-muted);margin-top:24px}

@media(max-width:768px){
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
  .proj-grid{grid-template-columns:1fr}
  .main{padding:20px}
  .nav{padding:0 20px}
  .tabs-row{width:100%;overflow-x:auto}
}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1qVcmNhLzGDuqukxjtvz1iaBdozt5WXnDvuF0M_oudC4/export?format=csv&gid=1576499634';

// ══════════════════════════════════════════════════════
//  CSV PARSER & FETCH (preserved exactly)
// ══════════════════════════════════════════════════════
function parseSheetCSV(csvText){
  const lines=csvText.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').map(l=>parseCSVLine(l));
  if(lines.length<5)return null;
  const headerRow=lines[1]||[];
  const SUB=['planned','actual','status','planned date','actual date'];
  const pps=[];
  for(let c=2;c<headerRow.length;c++){
    const cell=(headerRow[c]||'').trim();
    if(!cell||SUB.includes(cell.toLowerCase()))continue;
    if(cell.toUpperCase().includes('STATUS LEGEND')||cell.toUpperCase().includes('NOTE'))continue;
    const tm=cell.match(/\[(.+?)\]/);
    const type=tm?tm[1].trim():'NEW LAUNCH';
    const name=cell.replace(/\[.+?\]/,'').replace(/\n/g,' ').trim();
    if(name)pps.push({col:c,name,type});
  }
  if(!pps.length)return null;
  const msRows=[];let noteIdx=-1;
  for(let ri=3;ri<lines.length;ri++){
    const lbl=(lines[ri][1]||'').trim();
    if(!lbl)continue;
    if(['NOTE','CEO REMARK','STATUS LEGEND','ADD NEW'].some(k=>lbl.toUpperCase().includes(k))){noteIdx=ri;break;}
    msRows.push({ri,lbl});
  }
  return pps.map((pp,i)=>{
    const ms={};
    msRows.forEach(({ri,lbl})=>{
      const row=lines[ri];
      ms[lbl]={date:parseDMY((row[pp.col]||'').trim()),actualDate:parseDMY((row[pp.col+1]||'').trim()),status:normSt((row[pp.col+2]||'PENDING').trim().toUpperCase())};
    });
    return{id:i+1,name:pp.name,type:pp.type,ufType:ufType(pp.type),location:'Pune',totalUnits:0,area:'—',notes:noteIdx>=0?(lines[noteIdx][pp.col]||'').trim():'',milestones:ms};
  });
}
function parseCSVLine(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){r.push(cur);cur='';}else cur+=c;}
  r.push(cur);return r;
}
function parseDMY(s){
  if(!s||s==='—')return'';
  const mm=s.match(/^(\d{1,2})\/([A-Za-z]+)\/(\d{4})$/);
  if(mm){const mo={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};const m=mo[mm[2].toLowerCase().slice(0,3)];if(m)return`${mm[3]}-${String(m).padStart(2,'0')}-${mm[1].padStart(2,'0')}`;}
  const dm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(dm)return`${dm[3]}-${dm[2].padStart(2,'0')}-${dm[1].padStart(2,'0')}`;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  return'';
}
function normSt(s){return{DONE:'DONE','ON TRACK':'ON TRACK',WATCH:'WATCH','AT RISK':'AT RISK',PENDING:'PENDING'}[s]||'PENDING';}
function ufType(t){return(t==='HANDOVER'||t==='HANDOVER Q4')?'handover':'new-launch';}

let sheetLoadState='idle';
async function fetchCSV(url){
  const enc=encodeURIComponent(url);
  try{
    // If already an export URL, fetch directly; otherwise build one
    let exportUrl=url;
    if(!url.includes('/export?')){const m=url.match(/\/d\/(.*?)\//);const gm=url.match(/gid=(\d+)/);if(m)exportUrl=`https://docs.google.com/spreadsheets/d/${m[1]}/export?format=csv&gid=${gm?gm[1]:'0'}`;}
    const r=await fetch(exportUrl,{signal:AbortSignal.timeout(12000),redirect:'follow'});
    if(r.ok){const t=await r.text();if(t&&t.length>50&&!t.startsWith('<!'))return t;}
  }catch(e){}
  try{const r=await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(12000)});if(r.ok){const j=await r.json();if(j?.contents?.length>50&&!j.contents.startsWith('<!'))return j.contents;}}catch(e){}
  try{const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(12000)});if(r.ok){const t=await r.text();if(t&&t.length>50&&!t.startsWith('<!'))return t;}}catch(e){}
  try{const r=await fetch(`https://thingproxy.freeboard.io/fetch/${url}`,{signal:AbortSignal.timeout(12000)});if(r.ok){const t=await r.text();if(t&&t.length>50&&!t.startsWith('<!'))return t;}}catch(e){}
  throw new Error('All fetch strategies failed');
}
async function loadFromSheet(){
  if(!SHEET_CSV_URL){sheetLoadState='no-url';renderBanner();return;}
  sheetLoadState='loading';renderBanner();
  try{
    const text=await fetchCSV(SHEET_CSV_URL);
    const parsed=parseSheetCSV(text);
    if(!parsed||!parsed.length)throw new Error('No projects parsed');
    parsed.forEach(pp=>{
      const init=INIT_PROJECTS.find(ip=>ip.name.toLowerCase()===pp.name.toLowerCase());
      if(init){pp.totalUnits=pp.totalUnits||init.totalUnits;pp.area=(pp.area&&pp.area!=='—')?pp.area:init.area;if(!pp.notes)pp.notes=init.notes;}
    });
    projects=parsed;sheetLoadState='loaded';
    lastSaved='Google Sheet · '+new Date().toLocaleString('en-IN');
    saveData();render();
  }catch(e){console.warn(e.message);sheetLoadState='error';renderBanner();}
}
function renderBanner(){
  const b=document.getElementById('sheet-banner');if(!b)return;
  const si=document.getElementById('syncInfo');
  const msgs={
    loading:['Loading from Google Sheet…','var(--navy-l)','var(--navy)'],
    loaded:['✅ Live · Google Sheet','var(--teal-l)','var(--teal)'],
    error:['⚠ Could not reach Google Sheet — showing cached data','#FEF0F0','var(--red-dark)'],
    'no-url':['📋 Google Sheet not connected','var(--amber-l)','var(--amber)']
  };
  const [msg,bg,clr]=msgs[sheetLoadState]||msgs['no-url'];
  b.style.background=bg;b.style.color=clr;b.style.display='block';
  b.innerHTML=msg+(sheetLoadState==='loaded'||sheetLoadState==='error'?`<button onclick="loadFromSheet()" style="margin-left:12px;padding:2px 10px;font-size:11px;background:rgba(0,0,0,.06);border:none;border-radius:10px;cursor:pointer;font-weight:700;color:inherit">🔄 Refresh</button>`:'');
  if(si)si.textContent=sheetLoadState==='loaded'?'Synced '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' IST':sheetLoadState==='loading'?'Loading…':'Sheet offline';
}

function npDaysChip(dateStr, status){
  if(!dateStr||status==='NIL')return'<span style="font-size:10px;color:var(--text-muted)">—</span>';
  if(status==='DONE')return'<span class="dc dc-done">Done</span>';
  const d=daysFrom(dateStr);
  if(d===null)return'—';
  if(d<0)return`<span class="dc dc-over">${Math.abs(d)}d over</span>`;
  if(d<=30)return`<span class="dc dc-soon">${d}d</span>`;
  return`<span class="dc dc-ok">${d}d</span>`;
}

function npStatusBadge(s){
  if(s==='DONE')return'<span class="badge b-green">✓ Done</span>';
  if(s==='WIP')return'<span class="badge b-blue">In Progress</span>';
  if(s==='DELAYED')return'<span class="badge b-red">🔴 Delayed</span>';
  if(s==='NIL')return'<span class="badge b-gray">N/A</span>';
  return'<span class="badge b-gray">Pending</span>';
}

function npProgress(proj){
  const acts=proj.activities;
  const done=acts.filter(a=>a.status==='DONE').length;
  return Math.round(done/acts.length*100);
}

function npLaunchDate(proj){

}

  const el=document.getElementById('np_'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

function npUpdateDate(pid,idx,val){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  p.activities[idx].date=val;
  npSaveData();
  // Re-render just the chips in the table without full re-render
  const content=document.getElementById('tabContent');
  if(activeTab==='newplan')content.innerHTML=buildNewPlan();
}
function npUpdateStatus(pid,idx,val){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  p.activities[idx].status=val;
  npSaveData();
  const content=document.getElementById('tabContent');
  if(activeTab==='newplan')content.innerHTML=buildNewPlan();
}
function npDeleteActivity(pid,idx){
  if(!confirm('Delete this activity?'))return;
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  p.activities.splice(idx,1);
  npSaveData();
  const content=document.getElementById('tabContent');
  if(activeTab==='newplan')content.innerHTML=buildNewPlan();
}

function openNpActivity(pid,idx){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  const isNew=(idx===null);
  const act=isNew?{dept:'Sales',task:'',date:'',status:'PENDING'}:{...p.activities[idx]};
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2>${isNew?'Add Activity':'Edit Activity'} — ${p.name}</h2>
      <button class="btn-cancel-m" onclick="closeModal()" style="padding:4px 10px">✕</button>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label class="form-lbl">Department</label>
        <select class="form-inp" id="np_dept">
          ${NP_DEPTS.map(d=>`<option ${act.dept===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label class="form-lbl">Status</label>
        <select class="form-inp" id="np_status">
          ${NP_STATUSES.map(s=>`<option ${act.status===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-lbl">Activity / Task Name</label>
      <input class="form-inp" id="np_task" value="${act.task}" placeholder="e.g. RERA Registration, Concept Plan Approval..."/>
    </div>
    <div class="form-row">
      <label class="form-lbl">Planned Date</label>
      <input class="form-inp" type="date" id="np_date" value="${act.date||''}"/>
    </div>
    <div class="modal-btns">
      ${!isNew?`<button class="btn-danger" onclick="npDeleteActivity('${pid}',${idx});closeModal()">Delete</button>`:''}
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="npSaveActivity('${pid}',${isNew?'null':idx})">${isNew?'Add Activity':'Save Changes'}</button>
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function npSaveActivity(pid,idx){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  const act={
    dept:document.getElementById('np_dept').value,
    task:document.getElementById('np_task').value,
    date:document.getElementById('np_date').value,
    status:document.getElementById('np_status').value
  };
  if(!act.task.trim()){alert('Please enter a task name.');return;}
  if(idx===null||idx==='null'){p.activities.push(act);}else{p.activities[parseInt(idx)]=act;}
  closeModal();npSaveData();
  const content=document.getElementById('tabContent');
  if(activeTab==='newplan')content.innerHTML=buildNewPlan();
}

function openNpSalesEdit(pid){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  const s=p.sales;
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2>Edit Sales Params — ${p.name}</h2>
      <button class="btn-cancel-m" onclick="closeModal()" style="padding:4px 10px">✕</button>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-lbl">Plot Size (ft)</label><input class="form-inp" type="number" id="nps_plot" value="${s.plotSize}"/></div>
      <div class="form-row"><label class="form-lbl">Avg Saleable (sqft)</label><input class="form-inp" type="number" id="nps_avg" value="${s.avgSaleable}"/></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-lbl">BSP (₹/sqft)</label><input class="form-inp" type="number" id="nps_bsp" value="${s.bsp}"/></div>
      <div class="form-row"><label class="form-lbl">Total Units</label><input class="form-inp" type="number" id="nps_units" value="${s.totalUnits}"/></div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-lbl">Units Target FY27</label><input class="form-inp" type="number" id="nps_fy27u" value="${s.unitsFY27}"/></div>
      <div class="form-row"><label class="form-lbl">Revenue FY27 (₹ Cr)</label><input class="form-inp" type="number" id="nps_fy27r" value="${s.revFY27}"/></div>
    </div>
    <div class="form-row">
      <label class="form-lbl">Project Revenue (₹ Cr)</label><input class="form-inp" type="number" id="nps_projr" value="${s.projectRevenue}"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="npSaveSales('${pid}')">Save</button>
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function npSaveSales(pid){
  const p=npProjects.find(x=>x.id===pid);if(!p)return;
  p.sales.plotSize=parseInt(document.getElementById('nps_plot').value)||0;
  p.sales.avgSaleable=parseInt(document.getElementById('nps_avg').value)||0;
  p.sales.bsp=parseInt(document.getElementById('nps_bsp').value)||0;
  p.sales.totalUnits=parseInt(document.getElementById('nps_units').value)||0;
  p.sales.unitsFY27=parseInt(document.getElementById('nps_fy27u').value)||0;
  p.sales.revFY27=parseFloat(document.getElementById('nps_fy27r').value)||0;
  p.sales.projectRevenue=parseFloat(document.getElementById('nps_projr').value)||0;
  closeModal();npSaveData();
  const content=document.getElementById('tabContent');
  if(activeTab==='newplan')content.innerHTML=buildNewPlan();
}

function prog(p){return Math.round(MS.filter(m=>p.milestones[m]?.status===S.DONE).length/MS.length*100);}
function overallSt(p){if(MS.some(m=>p.milestones[m]?.status===S.RISK))return S.RISK;if(MS.some(m=>p.milestones[m]?.status===S.WATCH))return S.WATCH;if(prog(p)===100)return S.DONE;return S.OT;}
function badge(s){
  if(s===S.DONE)return'<span class="badge b-green">✓ Done</span>';
  if(s===S.OT)return'<span class="badge b-blue">On Track</span>';
  if(s===S.WATCH)return'<span class="badge b-amber">⚠ Watch</span>';
  if(s===S.RISK)return'<span class="badge b-red">🔴 At Risk</span>';
  return'<span class="badge b-gray">Pending</span>';
}
function pc(p){const s=overallSt(p);if(prog(p)===100)return'var(--teal)';if(s===S.RISK)return'var(--red)';if(s===S.WATCH)return'var(--amber)';return'var(--navy)';}
function icoClass(p){if(p.ufType==='handover')return['card-ico-teal','card-stripe-teal'];return['card-ico-navy','card-stripe-navy'];}
function getAlerts(){
  const a=[];
  projects.forEach(p=>{MS.forEach(m=>{const ms=p.milestones[m];if(!ms||!ms.date||ms.status===S.DONE)return;const d=daysFrom(ms.date);if(ms.status===S.RISK)a.push({type:'red',proj:p.name,m,date:ms.date,d});else if(d!==null&&d<=30&&d>=0)a.push({type:'amber',proj:p.name,m,date:ms.date,d});});});
  return a.sort((a,b)=>(a.d||999)-(b.d||999)).slice(0,8);
}

function render(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const tb=document.getElementById('tab-'+activeTab);if(tb)tb.classList.add('active');
  renderKPIs();
  const content=document.getElementById('tabContent');
  if(activeTab==='dashboard')content.innerHTML=buildDashboard();
  else if(activeTab==='tracker')content.innerHTML=buildTracker();
  else if(activeTab==='timeline')content.innerHTML=buildTimeline();
  else if(activeTab==='summary')content.innerHTML=buildSummary();
  else if(activeTab==='newplan')content.innerHTML=buildNewPlan();
  renderBanner();
  const lastEl=document.getElementById('lastSavedFooter');if(lastEl)lastEl.textContent=lastSaved;
  document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
}

function renderKPIs(){
  const total=projects.length, handovers=projects.filter(p=>p.ufType==='handover').length;
  const launches=projects.filter(p=>p.ufType==='new-launch').length;
  const atRisk=projects.filter(p=>overallSt(p)===S.RISK).length;
  const watching=projects.filter(p=>overallSt(p)===S.WATCH).length;
  const onTrack=projects.filter(p=>[S.OT,S.DONE].includes(overallSt(p))).length;
  const totalUnits=projects.reduce((s,p)=>s+(p.totalUnits||0),0);
  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi-cell"><div class="kpi-v">${total}</div><div class="kpi-l">Total Projects</div></div>
    <div class="kpi-cell"><div class="kpi-v">${handovers}</div><div class="kpi-l">Handovers FY27</div></div>
    <div class="kpi-cell"><div class="kpi-v">${launches}</div><div class="kpi-l">New Launches</div></div>
    <div class="kpi-cell"><div class="kpi-v" style="color:var(--teal)">${onTrack}</div><div class="kpi-l">On Track</div></div>
    <div class="kpi-cell"><div class="kpi-v" style="color:${atRisk>0?'var(--red)':'var(--amber)'}">${watching+atRisk}</div><div class="kpi-l">Watch / At Risk</div></div>
    <div class="kpi-cell"><div class="kpi-v">${totalUnits.toLocaleString('en-IN')}</div><div class="kpi-l">Total Units</div></div>`;
}

    <div class="card-stripe ${stripeC}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-ico ${icoC}">

            ${p.ufType==='handover'?'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>':'<path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/>'}
          </svg>
        </div>
        <div style="flex:1;min-width:0">
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.type} · ${p.totalUnits>0?p.totalUnits.toLocaleString('en-IN')+' units':''} ${p.area!=='—'?'· '+p.area:''} · ${p.location}</div>
        </div>
        <div style="flex-shrink:0">${badge(st)}</div>
      </div>
      <div>
        <div class="prog-row"><span>Progress</span><span style="color:${colour};font-weight:700">${pr}%</span></div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pr}%;background:${colour}"></div></div>
      </div>
      <div class="card-desc">
        ${keyDates.filter(kd=>{const ms=p.milestones[kd.m];return ms?.date;}).slice(0,3).map(kd=>{
          const ms=p.milestones[kd.m];const d=daysFrom(ms.date);
          const dc=ms.status===S.DONE?'<span class="dc dc-done">Done</span>':d===null?'<span class="dc-na">—</span>':d<0?`<span class="dc dc-over">${Math.abs(d)}d over</span>`:d<=30?`<span class="dc dc-soon">${d}d</span>`:`<span class="dc dc-ok">${d}d</span>`;

        }).join('')}

      <div class="ctags">
        ${p.ufType==='handover'?'<span class="tag">Handover</span>':'<span class="tag">New Launch</span>'}

function buildTimeline(){
  const now=new Date(),minD=new Date(2025,0,1),maxD=new Date(2028,0,1);
  const tot=(maxD-minD)/86400000;
  function pct(s){if(!s)return null;const d=new Date(s);return Math.max(0,Math.min(100,((d-minD)/86400000/tot)*100));}
  return`<div class="toolbar"><div class="toolbar-left"><h2>Timeline View</h2></div><div class="toolbar-right"><span style="font-size:11px;color:var(--text-muted)">2025 — 2028 · hover dots for dates</span></div></div>
  <div class="tl-card">
    <div style="display:flex;align-items:center;margin-bottom:16px;min-width:800px">

      <div style="flex:1;display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);padding:0 2px">
        ${['Jan 25','Jul 25','Jan 26','Jul 26','Jan 27','Jul 27','Jan 28'].map(l=>`<span>${l}</span>`).join('')}

      const pr=prog(p);const colour=pc(p);
      const barEnd=pp2||lp||Math.min(100,landP+20);const barW=Math.max(2,barEnd-landP);
      return`<div class="tl-row">
        <div class="tl-label" title="${p.name}">${p.name}</div>
        <div class="tl-track">
          <div class="tl-bar" style="left:${landP}%;width:${barW}%;background:${colour};opacity:.65">${pr}%</div>
          ${lp!==null?`<div class="tl-dot" style="left:${lp}%;background:var(--gold)"><div class="tl-tip">Launch: ${fmt(p.milestones['Official Launch Date']?.date)}</div></div>`:''}

    </div>
  </div>`;
}

function setTab(t){activeTab=t;render();}
function setFilter(f){filterType=f;render();}

function openProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2>${p.name}</h2>
      <button class="btn-cancel-m" onclick="closeModal()" style="padding:4px 10px">✕</button>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-lbl">Project Name</label><input class="form-inp" id="e_name" value="${p.name}"/></div>
      <div class="form-row"><label class="form-lbl">Type</label>
        <select class="form-inp" id="e_type">
          ${['HANDOVER','HANDOVER Q4','NEW LAUNCH','ONGOING'].map(t=>`<option ${p.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row"><label class="form-lbl">Total Units</label><input class="form-inp" type="number" id="e_units" value="${p.totalUnits}"/></div>
      <div class="form-row"><label class="form-lbl">Area</label><input class="form-inp" id="e_area" value="${p.area}"/></div>
    </div>
    <div class="form-row"><label class="form-lbl">Location</label><input class="form-inp" id="e_loc" value="${p.location}"/></div>
    <div class="form-row"><label class="form-lbl">CEO Notes</label><input class="form-inp" id="e_notes" value="${p.notes||''}"/></div>
    <div class="modal-btns">
      <button class="btn-danger" onclick="deleteProject(${p.id})">Delete</button>
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProject(${p.id})">Save Changes</button>
    </div>`;
  document.getElementById('modalBg').classList.add('open');
}

function saveProject(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('e_name').value;
  p.type=document.getElementById('e_type').value;
  p.ufType=ufType(p.type);
  p.totalUnits=parseInt(document.getElementById('e_units').value)||0;
  p.area=document.getElementById('e_area').value;
  p.location=document.getElementById('e_loc').value;
  p.notes=document.getElementById('e_notes').value;
  closeModal();saveData();render();
}
function deleteProject(id){if(!confirm('Delete this project?'))return;projects=projects.filter(p=>p.id!==id);closeModal();saveData();render();}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function openAddProject(){
  const id=Math.max(...projects.map(p=>p.id),0)+1;
  const ms={};MS.forEach(m=>{ms[m]={date:'',status:S.PENDING};});
  projects.push({id,name:'New Project '+id,type:'NEW LAUNCH',ufType:'new-launch',location:'Pune',totalUnits:0,area:'—',notes:'',milestones:ms});
  saveData();render();openProject(id);
}
function updateDate(pid,m,v){const p=projects.find(x=>x.id===pid);if(!p)return;if(!p.milestones[m])p.milestones[m]={date:'',status:S.PENDING};p.milestones[m].date=v;saveData();}
function updateActual(pid,m,v){const p=projects.find(x=>x.id===pid);if(!p)return;if(!p.milestones[m])p.milestones[m]={date:'',status:S.PENDING};p.milestones[m].actualDate=v;saveData();}
function updateStatus(pid,m,v){const p=projects.find(x=>x.id===pid);if(!p)return;if(!p.milestones[m])p.milestones[m]={date:'',status:S.PENDING};p.milestones[m].status=v;saveData();render();}
function openSheet(){window.open('https://docs.google.com/spreadsheets/d/1qVcmNhLzGDuqukxjtvz1iaBdozt5WXnDvuF0M_oudC4/edit?gid=1576499634','_blank');}
function exportCSV(){
  const rows=[['Project','Type','Units','Milestone','Planned','Actual','Status','Days']];
  projects.forEach(p=>{MS.forEach(m=>{const ms=p.milestones[m]||{};rows.push([p.name,p.type,p.totalUnits,m,ms.date||'',ms.actualDate||'',ms.status||S.PENDING,ms.date?daysFrom(ms.date):'']);});});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n')],{type:'text/csv'}));a.download='Mangalam_Tracker_'+today()+'.csv';a.click();
}

// INIT
initData();
</script>
</body>
