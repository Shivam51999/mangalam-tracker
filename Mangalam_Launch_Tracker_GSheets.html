<body>

<div id="app"></div>

<script>
// ─── GOOGLE SHEETS CONFIG ────────────────────────────────────────────
// STEP 1: After setting up the Google Sheet, publish it:
//   File > Share > Publish to web > Sheet: "Milestone Tracker" > Format: CSV > Publish
//   Copy the URL and paste it below.
// STEP 2: Replace the placeholder URL with your actual published CSV URL.
// NOTE: The URL looks like:
//   https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/pub?gid=0&single=true&output=csv

const SHEET_CSV_URL = ''; // ← PASTE YOUR PUBLISHED CSV URL HERE

// ─── CSV PARSER ───────────────────────────────────────────────────────
// Parses the Milestone Tracker CSV exported from Google Sheets.
// Column layout: col 1 = row#, col 2 = milestone name,
//   then groups of 3 per project: [Planned Date, Actual Date, Status]
// Row 1 = title, Row 2 = project headers, Row 3 = sub-headers (Planned/Actual/Status)
// Rows 4..22 = milestones, Row 23 = Notes row

function parseSheetCSV(csvText) {
  // Normalise line endings and split into rows
  const lines = csvText.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .split('\n').map(l => parseCSVLine(l));
  if (lines.length < 5) return null;

  // ── STEP 1: find project header columns ──────────────────────────────
  // Row index 1 = project name headers (title row is index 0).
  // Google Sheets exports merged cells with the VALUE in the FIRST column
  // of the merge and EMPTY strings in the remaining merged columns.
  // So "Life Park [HANDOVER]" appears at col 2, then cols 3 & 4 are "".
  // "Melizma [HANDOVER]" appears at col 5, cols 6 & 7 are "", and so on.
  //
  // Strategy: scan every column in row 1. Any column that has a non-empty
  // value AND is not "Planned Date" / "Actual Date" / "Status" is a project
  // header. Record its column index.

  const headerRow = lines[1] || [];
  const subRow    = lines[2] || []; // "Planned Date", "Actual Date", "Status"
  const SUB_LABELS = ['planned', 'actual', 'status', 'planned date', 'actual date'];

  const parsedProjects = [];
  for (let c = 2; c < headerRow.length; c++) {
    const cell = (headerRow[c] || '').trim();
    if (!cell) continue;
    // Skip sub-header labels that sometimes bleed into row 2 export
    if (SUB_LABELS.includes(cell.toLowerCase())) continue;
    // Skip legend or notes rows
    if (cell.toUpperCase().includes('STATUS LEGEND') ||
        cell.toUpperCase().includes('NOTE')) continue;

    const typeMatch = cell.match(/\[(.+?)\]/);
    const type = typeMatch ? typeMatch[1].trim() : 'NEW LAUNCH';
    const name = cell.replace(/\[.+?\]/, '').replace(/\n/g, ' ').trim();
    if (!name) continue;
    parsedProjects.push({ col: c, name, type });
  }

  console.log('Projects found in CSV header:', parsedProjects.map(p => p.name));
  if (parsedProjects.length === 0) return null;

  // ── STEP 2: find the milestone name rows ────────────────────────────
  // Rows starting at index 3 (row 4 in sheet). Column index 1 = milestone name.
  // Stop at the Notes row or end of data.
  const msRows = [];
  let noteRowIndex = -1;
  for (let ri = 3; ri < lines.length; ri++) {
    const label = (lines[ri][1] || '').trim();
    if (!label) continue;
    if (label.toUpperCase().includes('NOTE') ||
        label.toUpperCase().includes('CEO REMARK') ||
        label.toUpperCase().includes('STATUS LEGEND') ||
        label.toUpperCase().includes('ADD NEW')) {
      noteRowIndex = ri;
      break;
    }
    msRows.push({ ri, label });
  }

  // ── STEP 3: for each project, read its 3 columns (planned/actual/status)
  const result = parsedProjects.map((pp, idx) => {
    const milestones = {};
    msRows.forEach(({ ri, label }) => {
      const row = lines[ri];
      const planned = (row[pp.col]     || '').trim();
      const actual  = (row[pp.col + 1] || '').trim();
      const status  = (row[pp.col + 2] || 'PENDING').trim();
      milestones[label] = {
        date:       parseDateDDMMYYYY(planned),
        actualDate: parseDateDDMMYYYY(actual),
        status:     normalizeStatus(status.toUpperCase())
      };
    });

    // Notes row
    let notes = '';
    if (noteRowIndex >= 0) {
      notes = (lines[noteRowIndex][pp.col] || '').trim();
    }

    return {
      id:         idx + 1,
      name:       pp.name,
      type:       pp.type,
      ufType:     getUfType(pp.type),
      color:      getTypeColor(pp.type),
      location:   'Pune',
      totalUnits: 0,
      area:       '—',
      notes,
      milestones
    };
  });

  return result;
}

// Parse individual CSV line respecting quoted fields
function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur);
  return result;
}

// Convert DD/MM/YYYY or DD/MMM/YYYY to YYYY-MM-DD
function parseDateDDMMYYYY(s) {
  if (!s || s === '—' || s === '') return '';
  // Try DD/MMM/YYYY (e.g. 01/Jun/2026)
  const mmmMatch = s.match(/^(\d{1,2})\/([A-Za-z]+)\/(\d{4})$/);
  if (mmmMatch) {
    const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const m = months[mmmMatch[2].toLowerCase().slice(0,3)];
    if (m) return `${mmmMatch[3]}-${String(m).padStart(2,'0')}-${mmmMatch[1].padStart(2,'0')}`;
  }
  // Try DD/MM/YYYY
  const dmyMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (dmyMatch) return `${dmyMatch[3]}-${dmyMatch[2].padStart(2,'0')}-${dmyMatch[1].padStart(2,'0')}`;
  // Try YYYY-MM-DD passthrough
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return '';
}

function normalizeStatus(s) {
  const map = {'DONE':'DONE','ON TRACK':'ON TRACK','WATCH':'WATCH','AT RISK':'AT RISK','PENDING':'PENDING'};
  return map[s.toUpperCase()] || S.PENDING;
}

function getUfType(type) {
  if (type === 'HANDOVER' || type === 'HANDOVER Q4') return 'handover';
  if (type === 'NEW LAUNCH') return 'new-launch';
  if (type === 'ONGOING') return 'ongoing';
  return 'new-launch';
}

function getTypeColor(type) {
  if (type === 'HANDOVER' || type === 'HANDOVER Q4') return '#0D5C54';
  if (type === 'NEW LAUNCH') return '#1B5E9B';
  if (type === 'ONGOING') return '#D97706';
  return '#1B5E9B';
}

// ─── LOAD FROM GOOGLE SHEETS ─────────────────────────────────────────
// Fetches the published Google Sheet CSV using multiple proxy strategies.
// Works when hosted on any https:// page (GitHub Pages, Netlify, etc.)
//
// HOW TO GET YOUR URL:
//   In Google Sheets → File → Share → Publish to web
//   → Sheet: "Milestone Tracker" → Format: CSV → Publish
//   → Copy the URL and paste it below in SHEET_CSV_URL

let sheetLoadState = 'idle';

async function fetchCSV(rawUrl) {
  const enc = encodeURIComponent(rawUrl);

  // Strategy 1: Google's own CORS-friendly export URL
  // Convert publish URL to export URL — works without any proxy
  try {
    const match = rawUrl.match(/\/d\/(.*?)\//);
    const gidMatch = rawUrl.match(/gid=(\d+)/);
    if (match) {
      const sheetId = match[1];
      const gid = gidMatch ? gidMatch[1] : '0';
      const exportUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
      const r = await fetch(exportUrl, { signal: AbortSignal.timeout(12000), redirect: 'follow' });
      if (r.ok) {
        const text = await r.text();
        if (text && text.length > 50 && !text.startsWith('<!')) {
          console.log('✅ Loaded via Google export URL');
          return text;
        }
      }
    }
  } catch(e) { console.warn('Google export failed:', e.message); }

  // Strategy 2: allorigins.win — wraps response in JSON .contents
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${enc}`, { signal: AbortSignal.timeout(12000) });
    if (r.ok) {
      const j = await r.json();
      if (j && j.contents && j.contents.length > 50 && !j.contents.startsWith('<!')) {
        console.log('✅ Loaded via allorigins');
        return j.contents;
      }
    }
  } catch(e) { console.warn('allorigins failed:', e.message); }

  // Strategy 3: corsproxy.io
  try {
    const r = await fetch(`https://corsproxy.io/?${enc}`, { signal: AbortSignal.timeout(12000) });
    if (r.ok) {
      const text = await r.text();
      if (text && text.length > 50 && !text.startsWith('<!')) {
        console.log('✅ Loaded via corsproxy.io');
        return text;
      }
    }
  } catch(e) { console.warn('corsproxy.io failed:', e.message); }

  // Strategy 4: thingproxy.freeboard.io
  try {
    const r = await fetch(`https://thingproxy.freeboard.io/fetch/${rawUrl}`, { signal: AbortSignal.timeout(12000) });
    if (r.ok) {
      const text = await r.text();
      if (text && text.length > 50 && !text.startsWith('<!')) {
        console.log('✅ Loaded via thingproxy');
        return text;
      }
    }
  } catch(e) { console.warn('thingproxy failed:', e.message); }

  throw new Error('All fetch strategies failed. See console for details.');
}

async function loadFromSheet() {
  if (!SHEET_CSV_URL) {
    sheetLoadState = 'no-url';
    renderSheetBanner();
    return;
  }
  sheetLoadState = 'loading';
  renderSheetBanner();
  try {
    const text = await fetchCSV(SHEET_CSV_URL);
    const parsed = parseSheetCSV(text);
    if (!parsed || parsed.length === 0) throw new Error('CSV parsed but no projects found — check sheet structure');
    parsed.forEach(pp => {
      const init = INIT_PROJECTS.find(ip => ip.name.toLowerCase() === pp.name.toLowerCase());
      if (init) {
        pp.totalUnits = pp.totalUnits || init.totalUnits;
        pp.area = (pp.area && pp.area !== '—') ? pp.area : init.area;
        if (!pp.notes) pp.notes = init.notes;
      }
    });
    projects = parsed;
    sheetLoadState = 'loaded';
    lastSaved = 'Google Sheet · ' + new Date().toLocaleString('en-IN');
    saveData();
    render();
  } catch(e) {
    console.warn('Sheet load failed:', e.message);
    sheetLoadState = 'error';
    renderSheetBanner();
  }
}

function renderSheetBanner() {
  const banner = document.getElementById('sheet-banner');
  if (!banner) return;
  if (sheetLoadState === 'loading') {
    banner.innerHTML = '<span style="color:#1B5E9B">⏳ Loading from Google Sheet…</span>';
    banner.style.display = 'block';
  } else if (sheetLoadState === 'loaded') {
    banner.innerHTML = '<span style="color:#166534">✅ Data loaded from Google Sheet</span> <button onclick="loadFromSheet()" style="margin-left:10px;padding:2px 10px;font-size:11px;background:#DBEAFE;color:#1E40AF;border:none;border-radius:6px;cursor:pointer;font-weight:700">🔄 Refresh</button>';
    banner.style.display = 'block';
  } else if (sheetLoadState === 'error') {
    banner.innerHTML = '<span style="color:#7F1D1D">⚠ Could not load from Google Sheet — showing cached / default data.</span>'
      + '<span style="font-size:11px;color:#78350F;margin-left:6px"> Check: (1) URL is correct &amp; pasted in SHEET_CSV_URL, (2) Sheet is published to web as CSV, (3) Sheet sharing = "Anyone with link can view".</span>'
      + '<button onclick="loadFromSheet()" style="margin-left:10px;padding:2px 10px;font-size:11px;background:#FEE2E2;color:#7F1D1D;border:none;border-radius:6px;cursor:pointer;font-weight:700">🔄 Retry</button>';
    banner.style.display = 'block';
  } else if (sheetLoadState === 'no-url') {
    banner.innerHTML = `<span style="color:#92400E">📋 Google Sheet not connected yet.</span>
      <span style="font-size:11px;color:#78350F"> Paste your published CSV URL into <code>SHEET_CSV_URL</code> in the script. <a href="https://support.google.com/docs/answer/183965" target="_blank" style="color:#1B5E9B">How to publish?</a></span>`;
    banner.style.display = 'block';
  }
}


// ─── DATA ────────────────────────────────────────────────────────────
const MILESTONES = [
  "Land Finalised",
  "Feasibility Approved (SSS)",
  "Architect Appointed",
  "Concept Design Approved",
  "Layout Approval Filed",
  "Environment Clearance (EC)",
  "Sanction / IOD Received",
  "RERA Registration",
  "Construction Finance Arranged",
  "GFC Issued (SSS Signed)",
  "Excavation / Work Start",
  "Show Flat / Sample Flat Ready",
  "Soft Launch / Broker Preview",
  "Official Launch Date",
  "Structure Complete",
  "Finishing Work Start",
  "OC / CC Applied",
  "OC / CC Received",
  "Possession Start",
];

// Status options

function dStr(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function today(){ return new Date().toISOString().split('T')[0]; }
function daysFrom(dateStr){
  if(!dateStr) return null;
  const diff = Math.round((new Date(dateStr) - new Date()) / 86400000);
  return diff;
}
function fmt(dateStr){
  if(!dateStr) return "—";
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

let activeTab = 'dashboard';
let expandedProj = null;
let editModal = null;

// Load from localStorage if available
function loadData(){
  try{
    const saved = localStorage.getItem('mangalam_launch_tracker');
    if(saved){ projects = JSON.parse(saved); lastSaved = localStorage.getItem('mlt_saved') || lastSaved; }
  }catch(e){}
}

// On page load, try to refresh from Sheet (async, non-blocking)
async function initData(){
  loadData(); // load from cache first (instant)
  render();   // show immediately
  await loadFromSheet(); // then update from sheet (async)
}

function saveData(){
  try{
    localStorage.setItem('mangalam_launch_tracker', JSON.stringify(projects));
    lastSaved = new Date().toLocaleString('en-IN');
    localStorage.setItem('mlt_saved', lastSaved);
  }catch(e){}
}

loadData();

// ─── COMPUTED ─────────────────────────────────────────────────────────
function getProgress(proj){
  const total = MILESTONES.length;
  const done = MILESTONES.filter(m => proj.milestones[m]?.status === S.DONE).length;
  return Math.round((done/total)*100);
}

function getOverallStatus(proj){
  const ms = proj.milestones;
  const hasCritical = MILESTONES.some(m => ms[m]?.status === S.RISK);
  const hasWatch = MILESTONES.some(m => ms[m]?.status === S.WATCH);
  const allDone = getProgress(proj) === 100;
  if(allDone) return S.DONE;
  if(hasCritical) return S.RISK;
  if(hasWatch) return S.WATCH;
  return S.OT;
}

function badgeForStatus(s){
  if(s===S.DONE)    return '<span class="badge badge-green">✓ DONE</span>';
  if(s===S.OT)      return '<span class="badge badge-blue">ON TRACK</span>';
  if(s===S.WATCH)   return '<span class="badge badge-amber">⚠ WATCH</span>';
  if(s===S.RISK)    return '<span class="badge badge-red">🔴 AT RISK</span>';
  return '<span class="badge badge-gray">PENDING</span>';
}

function getAlerts(){
  const alerts = [];
  projects.forEach(p => {
    MILESTONES.forEach(m => {
      const ms = p.milestones[m];
      if(!ms || !ms.date || ms.status === S.DONE) return;
      const days = daysFrom(ms.date);
      if(ms.status === S.RISK){
        alerts.push({type:'red', proj:p.name, ms:m, date:ms.date, days});
      } else if(days !== null && days <= 30 && days >= 0 && ms.status !== S.DONE){
        alerts.push({type:'amber', proj:p.name, ms:m, date:ms.date, days});
      }
    });
  });
  alerts.sort((a,b) => (a.days||999) - (b.days||999));
  return alerts.slice(0,10);
}

function buildTimeline(){
  const START = new Date('2025-01-01');
  const END   = new Date('2028-01-01');
  const totalDays = (END - START) / 86400000;

  function pct(dateStr){
    if(!dateStr) return null;
    return Math.max(0, Math.min(100, ((new Date(dateStr) - START) / 86400000 / totalDays) * 100));
  }

  const months = [];
  let d = new Date(START);
  while(d < END){
    months.push({label: d.toLocaleDateString('en-IN',{month:'short',year:'2-digit'}), pct: pct(d.toISOString().split('T')[0])});
    d = new Date(d.getFullYear(), d.getMonth()+1, 1);
  }

  const todayPct = pct(today());

  return `
  ${buildKPIs()}
  <div class="timeline-wrap">
    <div class="sec-title" style="margin-bottom:16px">
      📆 Project Timeline — 2025 to 2028
      <span style="font-size:11px;font-weight:400;color:#6B7280">Hover over milestones for details</span>
    </div>
    
    <div class="legend" style="margin-bottom:12px">
      <div class="leg"><div class="leg-dot" style="background:#0D5C54"></div>Handover / Possession</div>
      <div class="leg"><div class="leg-dot" style="background:#1B5E9B"></div>New Launch</div>
      <div class="leg"><div class="leg-dot" style="background:#C9A227"></div>EC Date</div>
      <div class="leg"><div class="leg-dot" style="background:#C0392B"></div>Sanction/IOD</div>
      <div class="leg"><div class="leg-dot" style="background:#4A1A8A"></div>RERA</div>
      <div class="leg"><div class="leg-dot" style="background:#0F2850"></div>Launch Date</div>
    </div>

    <!-- Month ruler -->
    <div style="display:flex;padding-left:150px;margin-bottom:4px;position:relative;min-width:900px">
      ${months.filter((_,i)=>i%3===0).map(m=>`
      <div style="position:absolute;left:calc(150px + ${m.pct}%);font-size:9px;color:#9CA3AF;transform:translateX(-50%)">${m.label}</div>
      `).join('')}
      <!-- Today line -->
      <div style="position:absolute;left:calc(150px + ${todayPct}%);top:-2px;height:calc(100% + ${projects.length*38+16}px);border-left:2px dashed #C0392B;z-index:1;pointer-events:none">
        <span style="position:absolute;top:-14px;left:2px;font-size:9px;color:#C0392B;font-weight:700;white-space:nowrap">TODAY</span>
      </div>
    </div>

    <!-- Project rows -->
    <div style="min-width:900px;margin-top:16px">
    ${projects.map(p => {
      const start = p.milestones['Land Finalised']?.date;
      const end   = p.milestones['Possession Start']?.date;
      const sp = pct(start), ep = pct(end);
      const barW = (sp !== null && ep !== null) ? Math.max(1, ep - sp) : 0;
      const keyMilestones = [
        { ms:'Environment Clearance (EC)',  color:'#C9A227' },
        { ms:'Sanction / IOD Received',     color:'#C0392B' },
        { ms:'RERA Registration',           color:'#4A1A8A' },
        { ms:'Official Launch Date',        color:'#0F2850' },
        { ms:'Possession Start',            color:'#0D5C54' },
      ];
      return `
      <div class="tl-row" style="margin-bottom:10px">
        <div class="tl-proj">${p.name}<br/><span style="font-size:9px;color:#9CA3AF;font-weight:400">${p.type}</span></div>
        <div class="tl-track">
          ${sp!==null && ep!==null ? `
          <div class="tl-bar" style="left:${sp}%;width:${barW}%;background:${p.color};opacity:.85">
            <span>${p.name}</span>
          </div>` : ''}
          ${keyMilestones.map(km => {
            const d = p.milestones[km.ms]?.date;
            const kp = pct(d);
            if(kp === null) return '';
            return `
            <div class="tl-milestone" style="left:${kp}%;background:${km.color}">
              <div class="tl-tip">${km.ms}<br/>${fmt(d)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

}

function setTab(t){ activeTab=t; render(); }
function setFilter(f){ filterType=f; render(); }

function openProject(id){
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  const modal = document.getElementById('modalBg');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">${p.name} — Edit Details</h2>
      <button class="btn btn-outline" style="background:#F3F4F6;color:#374151;border:none" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label class="form-label">Project Name</label>
        <input class="form-input" id="e_name" value="${p.name}"/>
      </div>
      <div class="form-row">
        <label class="form-label">Type</label>
        <select class="form-input" id="e_type">
          <option value="HANDOVER" ${p.type==='HANDOVER'?'selected':''}>HANDOVER</option>
          <option value="HANDOVER Q4" ${p.type==='HANDOVER Q4'?'selected':''}>HANDOVER Q4</option>
          <option value="NEW LAUNCH" ${p.type==='NEW LAUNCH'?'selected':''}>NEW LAUNCH</option>
          <option value="ONGOING" ${p.type==='ONGOING'?'selected':''}>ONGOING</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label class="form-label">Total Units</label>
        <input class="form-input" id="e_units" type="number" value="${p.totalUnits}"/>
      </div>
      <div class="form-row">
        <label class="form-label">Area</label>
        <input class="form-input" id="e_area" value="${p.area}"/>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Notes (CEO view)</label>
      <input class="form-input" id="e_notes" value="${p.notes||''}"/>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" style="background:#FEE2E2;color:#7F1D1D;border:none" onclick="deleteProject(${p.id})">Delete Project</button>
      <button class="btn btn-outline" style="background:#F3F4F6;color:#374151;border:none" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveProject(${p.id})">Save Changes</button>
    </div>`;
  modal.classList.add('open');
}

function saveProject(id){
  const p = projects.find(x=>x.id===id);
  if(!p) return;
  p.name = document.getElementById('e_name').value;
  p.type = document.getElementById('e_type').value;
  p.ufType = p.type.toLowerCase().replace(' ','').replace('q4','');
  p.totalUnits = parseInt(document.getElementById('e_units').value)||0;
  p.area = document.getElementById('e_area').value;
  p.notes = document.getElementById('e_notes').value;
  closeModal();
  saveData();
  render();
}

function deleteProject(id){
  if(!confirm('Delete this project?')) return;
  projects = projects.filter(p=>p.id!==id);
  closeModal();
  saveData();
  render();
}

function closeModal(){
  document.getElementById('modalBg')?.classList.remove('open');
}

function addProject(){
  const id = Math.max(...projects.map(p=>p.id))+1;
  const newMs = {};
  MILESTONES.forEach(m => { newMs[m] = {date:'',status:S.PENDING}; });
  projects.push({
    id, name:'New Project '+id, type:'NEW LAUNCH', ufType:'new-launch',
    color:'#1B5E9B', location:'Pune', totalUnits:0, area:'0 L Sqft',
    notes:'', milestones: newMs
  });
  saveData();
  render();
  openProject(id);
}

function updateDate(projId, ms, val){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  if(!p.milestones[ms]) p.milestones[ms]={date:'',status:S.PENDING};
  p.milestones[ms].date = val;
  saveData();
  render();
}

function updateActual(projId, ms, val){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  if(!p.milestones[ms]) p.milestones[ms]={date:'',status:S.PENDING};
  p.milestones[ms].actualDate = val;
  saveData();
}

function updateStatus(projId, ms, val){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  if(!p.milestones[ms]) p.milestones[ms]={date:'',status:S.PENDING};
  p.milestones[ms].status = val;
  saveData();
  render();
}

function updateNote(projId, ms, val){
  const p = projects.find(x=>x.id===projId);
  if(!p) return;
  if(!p.milestones[ms]) p.milestones[ms]={date:'',status:S.PENDING};
  p.milestones[ms].note = val;
  saveData();
}

function openSheet(){
  if(!SHEET_CSV_URL){
    alert('No Google Sheet connected yet.\n\nPaste your published CSV URL into SHEET_CSV_URL in the script.');
    return;
  }
  // Convert CSV publish URL to view URL
  const viewUrl = SHEET_CSV_URL.replace('/pub?', '/edit?').split('output=csv')[0];
  window.open(viewUrl || SHEET_CSV_URL, '_blank');
}

function openAddProjectInSheet(){
  if(!SHEET_CSV_URL){
    alert('No Google Sheet connected yet.\n\nStep 1: Run the Google Apps Script setup.\nStep 2: Paste your published CSV URL into SHEET_CSV_URL.\n\nFor now, a new blank project will be added locally.');
    addProject();
    return;
  }
  const confirmed = confirm('This will open your Google Sheet.\n\nIn the sheet, use the menu:\n🏗 Mangalam Tools > ➕ Add New Project\n\nAfter saving, click "Refresh" in the dashboard banner to reload data.');
  if(confirmed) openSheet();
}

function exportCSV(){
  const rows = [['Project','Type','Units','Milestone','Planned Date','Actual Date','Status','Days','Note']];
  projects.forEach(p => {
    MILESTONES.forEach(ms => {
      const m = p.milestones[ms]||{};
      const days = m.date ? daysFrom(m.date) : '';
      rows.push([p.name, p.type, p.totalUnits, ms, m.date||'', m.actualDate||'', m.status||S.PENDING, days, m.note||'']);
    });
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Mangalam_Launch_Tracker_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ─── INIT ─────────────────────────────────────────────────────────────
initData();
</script>
